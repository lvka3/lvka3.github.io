<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器维护公告</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text-primary: #1e1e2f;
            --text-secondary: #4a4f5c;
            --text-muted: #8b8f9a;
            --accent: #e07b1f;
            --border: #edf0f4;
            --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.03);
            --shadow-banner: 0 2px 8px rgba(0, 0, 0, 0.04);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 18px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background-color: var(--bg);
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.018) 1px, transparent 1px);
            background-size: 44px 44px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景装饰光晕 */
        .bg-decoration {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .circle-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(224, 123, 31, 0.04) 0%, transparent 70%);
            top: -200px;
            right: -140px;
        }
        .circle-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(66, 133, 244, 0.03) 0%, transparent 70%);
            bottom: -180px;
            left: -120px;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 顶部更新提示 */
        .update-banner {
            background: #fffef9;
            border: 1px solid #f0e4cc;
            border-left: 4px solid #e07b1f;
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            margin-bottom: 14px;
            font-size: 0.84rem;
            color: #6b5514;
            box-shadow: var(--shadow-banner);
            animation: fadeInUp 0.5s ease-out 0.05s both;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .banner-dot {
            flex-shrink: 0;
            width: 8px;
            height: 8px;
            background: #e07b1f;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(224, 123, 31, 0.18);
        }
        .banner-text strong {
            font-weight: 650;
            color: #4b3c1a;
        }

        /* 主卡片 */
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out 0.1s both;
        }
        .card-accent-bar {
            height: 4px;
            background: linear-gradient(90deg, #e07b1f 0%, #f5a623 50%, #e07b1f 100%);
        }
        .card-body {
            padding: 30px 32px 28px;
        }

        /* 标题区域 */
        .header-section {
            text-align: center;
            margin-bottom: 26px;
        }
        .main-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e1e2f;
            letter-spacing: 0.03em;
            margin: 0;
        }

        /* 信息列表 */
        .info-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .info-item {
            padding: 14px 12px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }
        .info-item:hover {
            background: #fafbfc;
        }
        .info-item+.info-item {
            border-top: 1px solid #f2f3f7;
        }
        .info-item-label {
            font-size: 0.76rem;
            font-weight: 650;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .info-item-value {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.6;
            word-break: break-word;
        }
        .info-item-value.empty-value {
            color: #c5cad3;
            font-style: italic;
            font-weight: 400;
        }
        .divider {
            border: none;
            border-top: 1px dashed #e5e7eb;
            margin: 6px 0;
        }

        /* 底部联系客服 */
        .contact-section {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f1f4;
            font-size: 0.92rem;
            color: #4b5563;
            line-height: 1.7;
        }
        .contact-text {
            color: #4b5563;
        }
        .contact-link {
            color: #1e40af;
            text-decoration: underline;
            cursor: pointer;
            font-weight: 550;
            transition: color 0.2s;
            text-underline-offset: 2px;
        }
        .contact-link:hover {
            color: #e07b1f;
            text-decoration: underline;
        }
        .contact-link:active {
            opacity: 0.8;
        }

        /* Toast 提示 */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .toast-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .toast-box {
            background: #1e1e2f;
            color: #f9fafb;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 500;
            text-align: center;
            max-width: 85vw;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.02em;
            line-height: 1.6;
        }
        .toast-overlay.closing .toast-box {
            animation: toastOut 0.2s ease-in forwards;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-12px) scale(0.93);
            }
        }

        /* ---------- 手机适配 ---------- */
        @media (max-width: 600px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 30px;
            }
            .card-body {
                padding: 24px 18px 22px;
            }
            .main-title {
                font-size: 1.45rem;
            }
            .info-item {
                padding: 12px 8px;
            }
            .info-item-label {
                font-size: 0.7rem;
            }
            .info-item-value {
                font-size: 0.88rem;
            }
            .contact-section {
                font-size: 0.85rem;
            }
            .update-banner {
                font-size: 0.78rem;
                padding: 10px 14px;
            }
            .toast-box {
                font-size: 0.85rem;
                padding: 14px 18px;
            }
        }
        @media (max-width: 380px) {
            .card-body {
                padding: 20px 14px 18px;
            }
            .main-title {
                font-size: 1.3rem;
            }
            .info-item {
                padding: 10px 6px;
            }
            .info-item-value {
                font-size: 0.82rem;
            }
            .contact-section {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration circle-1"></div>
    <div class="bg-decoration circle-2"></div>

    <div class="page-wrapper">
        <!-- 更新提示 -->
        <div class="update-banner">
            <span class="banner-dot"></span>
            <span class="banner-text">
                本网页更新于 <strong>2026/07/21 21:47</strong>，请注意公告内容的有效期限。
            </span>
        </div>

        <!-- 主卡片 -->
        <div class="main-card">
            <div class="card-accent-bar"></div>
            <div class="card-body">
                <div class="header-section">
                    <h1 class="main-title">服务器维护公告</h1>
                </div>

                <ul class="info-list">
                    <li class="info-item">
                        <div class="info-item-label">维护对象</div>
                        <div class="info-item-value">测试32线_cn-tw_lvka</div>
                    </li>
                    <li class="info-item">
                        <div class="info-item-label">维护时间</div>
                        <div class="info-item-value">
                            2026年7月21日 23:50 &nbsp;～&nbsp; 7月22日 19:50
                        </div>
                    </li>
                    <li class="info-item">
                        <div class="info-item-label">维护影响</div>
                        <div class="info-item-value">
                            维护期间您无法使用该线路下的任何联网服务，我们建议您更换到其他线路。
                        </div>
                    </li>
                    <hr class="divider">
                    <li class="info-item">
                        <div class="info-item-label">维护内容</div>
                        <div class="info-item-value empty-value">——</div>
                    </li>
                    <li class="info-item">
                        <div class="info-item-label">维护补偿</div>
                        <div class="info-item-value empty-value">——</div>
                    </li>
                </ul>

                <div class="contact-section">
                    <span class="contact-text">若对该公告内容有疑问，请</span>
                    <span class="contact-link" id="contactLink">单击此处</span>
                    <span class="contact-text">联系客服。</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box">请联系您的组织的管理员。</div>
    </div>

    <script>
        (function() {
            const contactLink = document.getElementById('contactLink');
            const toastOverlay = document.getElementById('toastOverlay');
            let toastTimer = null;
            let isToastVisible = false;

            function showToast() {
                if (toastTimer) {
                    clearTimeout(toastTimer);
                    toastTimer = null;
                }
                if (isToastVisible) {
                    toastOverlay.classList.add('closing');
                    toastOverlay.classList.remove('active');
                    setTimeout(() => {
                        toastOverlay.classList.remove('closing');
                        displayToast();
                    }, 220);
                } else {
                    displayToast();
                }
            }

            function displayToast() {
                toastOverlay.classList.add('active');
                toastOverlay.classList.remove('closing');
                isToastVisible = true;
                toastTimer = setTimeout(() => {
                    hideToast();
                }, 3000);
            }

            function hideToast() {
                toastOverlay.classList.add('closing');
                toastOverlay.classList.remove('active');
                isToastVisible = false;
                if (toastTimer) {
                    clearTimeout(toastTimer);
                    toastTimer = null;
                }
                setTimeout(() => {
                    toastOverlay.classList.remove('closing');
                }, 250);
            }

            contactLink.addEventListener('click', function(e) {
                e.preventDefault();
                showToast();
            });

            toastOverlay.addEventListener('click', function(e) {
                if (e.target === toastOverlay && isToastVisible) {
                    hideToast();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isToastVisible) {
                    hideToast();
                }
            });

            toastOverlay.addEventListener('touchstart', function(e) {
                if (e.target === toastOverlay && isToastVisible) {
                    e.preventDefault();
                    hideToast();
                }
            }, { passive: false });
        })();
    </script>
</body>
</html>
