        :root {
            --bg: #f5f7fb;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-primary: #1e1e2f;
            --text-muted: #8b8f9a;
            --accent: #e07b1f;
            --accent-soft: rgba(224, 123, 31, 0.08);
            --shadow-card: 0 15px 30px rgba(0, 0, 0, 0.06);
            --radius-sm: 10px;
            --radius-lg: 22px;
            --drawer-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'NeuBZ', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            font-weight: 600; /* 全局加粗 */
            background: radial-gradient(circle at 30% 10%, #fff7ed 0%, #f0f4fa 60%, #eef1f6 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        .bg-decoration {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .circle-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(224, 123, 31, 0.05) 0%, transparent 70%);
            top: -250px;
            right: -200px;
        }
        .circle-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 125, 255, 0.04) 0%, transparent 70%);
            bottom: -240px;
            left: -160px;
        }
        .circle-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(224, 123, 31, 0.03) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(224, 123, 31, 0.16);
            border-radius: 50%;
            animation: rise 10s infinite;
            bottom: -40px;
        }
        .particle:nth-child(1) { left: 10%; width: 5px; height: 5px; animation-duration: 9s; }
        .particle:nth-child(2) { left: 25%; width: 7px; height: 7px; animation-duration: 12s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 45%; width: 4px; height: 4px; animation-duration: 8s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 65%; width: 8px; height: 8px; animation-duration: 11s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 80%; width: 6px; height: 6px; animation-duration: 10s; animation-delay: 3s; }
        @keyframes rise {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
        }

        .page-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 580px;
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .update-banner {
            background: rgba(255, 254, 248, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 210, 170, 0.5);
            border-left: 4px solid #e07b1f;
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            margin-bottom: 12px;
            font-size: 0.82rem;
            color: #5e4516;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .banner-dot {
            width: 8px;
            height: 8px;
            background: #e07b1f;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(224,123,31,0.15);
            flex-shrink: 0;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .card-accent-bar {
            height: 3px;
            background: linear-gradient(90deg, #e07b1f 0%, #f5a623 50%, #e07b1f 100%);
        }
        .card-body {
            padding: 24px 28px 22px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .main-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .info-list { list-style: none; }
        .info-item {
            padding: 12px 10px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }
        .info-item:hover { background: rgba(0,0,0,0.02); }
        .info-item+.info-item { border-top: 1px solid rgba(0,0,0,0.04); }
        .info-item-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .info-item-value {
            font-size: 0.92rem;
            font-weight: 600;
            word-break: break-word;
        }
        .empty-value { color: #c5cad3; font-style: italic; font-weight: 500; }
        .divider {
            border: none;
            border-top: 1px dashed #e5e7eb;
            margin: 6px 0;
        }

        .contact-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid #f0f1f4;
            font-size: 0.88rem;
            color: #4b5563;
        }
        .contact-link { color: #1e40af; text-decoration: underline; cursor: pointer; font-weight: 700; }
        .contact-link:hover { color: #e07b1f; }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.65rem;
            color: #9aa0b0;
            letter-spacing: 0.04em;
        }

        .lang-fab,
        .detail-fab {
            position: fixed;
            bottom: 24px;
            z-index: 1001;
            height: 46px;
            padding: 0 22px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.15);
            transition: all 0.25s;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            font-family: inherit;
        }
        .lang-fab {
            right: 24px;
            background: rgba(224, 123, 31, 0.9);
            color: #fff;
        }
        .lang-fab:hover { background: #c96a18; transform: translateY(-2px); }
        .detail-fab {
            left: 24px;
            background: rgba(30, 30, 47, 0.9);
            color: #fff;
        }
        .detail-fab:hover { background: #1a1a2e; transform: translateY(-2px); }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            display: flex;
            justify-content: flex-end;
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }
        .drawer-panel {
            width: var(--drawer-width);
            max-width: 85vw;
            height: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            box-shadow: -8px 0 30px rgba(0,0,0,0.12);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
        }
        .drawer-overlay.active .drawer-panel { transform: translateX(0); }
        .drawer-header {
            padding: 20px 22px 14px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-title { font-size: 1rem; font-weight: 700; }
        .drawer-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #6b7280;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        .drawer-lang-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .drawer-lang-btn {
            width: 100%;
            text-align: left;
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            color: #1e1e2f;
            transition: all 0.2s;
            font-family: inherit;
        }
        .drawer-lang-btn:hover { background: #f9fafb; border-color: #e5e7eb; }
        .drawer-lang-btn.active {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(25px);
            border-radius: 26px;
            width: 92%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            padding: 24px 22px;
            animation: modalPop 0.25s ease-out;
        }
        @keyframes modalPop { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .modal-title { font-size: 1.2rem; font-weight: 700; }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        .info-block { margin-bottom: 20px; }
        .info-block h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 0.85rem;
        }
        .info-row span:first-child { color: #4a4f5c; font-weight: 600; white-space: nowrap; }
        .info-row span:last-child { font-weight: 700; color: #1e1e2f; text-align: right; }
        .load-high { color: #c44536; font-weight: 700; }

        .toast-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .toast-overlay.active { opacity: 1; pointer-events: auto; }
        .toast-box {
            background: #1e1e2f;
            color: #f9fafb;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
            max-width: 85vw;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: toastIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(18px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .card-body { padding: 20px 18px 18px; }
            .lang-fab, .detail-fab {
                height: 42px;
                padding: 0 16px;
                font-size: 0.8rem;
                bottom: 18px;
            }
            .lang-fab { right: 14px; }
            .detail-fab { left: 14px; }
            .main-title { font-size: 1.4rem; }
            .update-banner { font-size: 0.78rem; padding: 8px 14px; }
            .info-item-value { font-size: 0.85rem; }
            .modal-box { padding: 20px 16px; }
        }

                langFab.textContent = d.langBtn || d.drawerTitle;  // 关键修复：动态更新语言按钮文字
                detailFab.textContent = d.detailBtn;
                detailTitle.textContent = d.detailTitle;
                devHead.textContent = d.devHead;
                srvHead.textContent = d.srvHead;
                document.documentElement.lang = lang;
                document.documentElement.dir = rtlLangs.includes(lang) ? 'rtl' : 'ltr';
                updateDrawerActive(lang);
                rebindContact();
                if (detailModal.classList.contains('active')) renderDetailModal(lang);
            }

            function updateDrawerActive(lang) {
                drawerList.querySelectorAll('.drawer-lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            }

            function switchLanguage(lang) {
                if (lang === currentLang || !langOrder.includes(lang)) return;
                currentLang = lang;
                updateUI(lang);
                try { localStorage.setItem('preferred-language', lang); } catch(e) {}
            }

            function openDrawer() { drawerOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
            function closeDrawer() { drawerOverlay.classList.remove('active'); document.body.style.overflow = ''; }

            function rebindContact() {
                const link = document.getElementById('contactLink');
                if (link) link.onclick = (e) => { e.preventDefault(); showToast(); };
            }

            function showToast() {
                if (toastOverlay.classList.contains('active')) {
                    toastOverlay.classList.remove('active');
                    setTimeout(() => {
                        toastBox.textContent = getLangData(currentLang).toast;
                        toastOverlay.classList.add('active');
                    }, 200);
                } else {
                    toastBox.textContent = getLangData(currentLang).toast;
                    toastOverlay.classList.add('active');
                }
                clearTimeout(toastOverlay._timeout);
                toastOverlay._timeout = setTimeout(() => toastOverlay.classList.remove('active'), 3000);
            }

            function renderDetailModal(lang) {
                const d = getLangData(lang);
                const online = navigator.onLine;
                const now = new Date().toLocaleTimeString();
                devContent.innerHTML = `
                    <div class="info-row"><span>${d.ua}</span><span>${navigator.userAgent || '—'}</span></div>
                    <div class="info-row"><span>${d.plat}</span><span>${navigator.platform || '—'}</span></div>
                    <div class="info-row"><span>${d.lang}</span><span>${navigator.language || '—'}</span></div>
                    <div class="info-row"><span>${d.scr}</span><span>${screen.width}×${screen.height}</span></div>
                    <div class="info-row"><span>${d.vp}</span><span>${window.innerWidth}×${window.innerHeight}</span></div>
                    <div class="info-row"><span>${d.net}</span><span>${navigator.connection?.effectiveType || 'unknown'}</span></div>
                    <div class="info-row"><span>${d.online}</span><span>${online ? d.onlineYes : d.onlineNo}</span></div>
                    <div class="info-row"><span>${d.timeNow}</span><span id="liveTime">${now}</span></div>
                `;
                // 仅保留负载，移除延迟显示
                srvContent.innerHTML = `
                    <div class="info-row"><span>${d.load}</span><span class="load-high">${d.loadHigh}</span></div>
                `;
            }

            function updateLiveTime() {
                if (!detailModal.classList.contains('active')) return;
                const liveTime = document.getElementById('liveTime');
                if (liveTime) liveTime.textContent = new Date().toLocaleTimeString();
            }

            let liveTimer = null;
            function openDetailModal() {
                detailModal.classList.add('active');
                document.body.style.overflow = 'hidden';
                renderDetailModal(currentLang);
                if (liveTimer) clearInterval(liveTimer);
                liveTimer = setInterval(updateLiveTime, 1000);
            }

            function closeDetailModal() {
                detailModal.classList.remove('active');
                document.body.style.overflow = '';
                if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
            }

            langFab.onclick = () => drawerOverlay.classList.contains('active') ? closeDrawer() : openDrawer();
            drawerClose.onclick = closeDrawer;
            drawerOverlay.onclick = (e) => { if (e.target === drawerOverlay) closeDrawer(); };
            detailFab.onclick = openDetailModal;
            modalClose.onclick = closeDetailModal;
            detailModal.onclick = (e) => { if (e.target === detailModal) closeDetailModal(); };
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (drawerOverlay.classList.contains('active')) closeDrawer();
                    else if (detailModal.classList.contains('active')) closeDetailModal();
                }
            });

            function init() {
                buildDrawer();
                const saved = (() => { try { return localStorage.getItem('preferred-language'); } catch(e) { return null; } })();
                const browser = navigator.language || '';
                let def = 'zh-CN';
                if (saved && langOrder.includes(saved)) def = saved;
                else if (browser === 'zh-TW' || browser.startsWith('zh-Hant')) def = 'zh-TW';
                else if (browser.startsWith('zh')) def = 'zh-CN';
                else if (langOrder.includes(browser)) def = browser;
                else { const base = browser.split('-')[0]; if (langOrder.includes(base)) def = base; }
                currentLang = def;
                updateUI(def);
                rebindContact();
            }
            init();
        })();
    </script>
</body>
</html>
