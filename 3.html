            position: absolute; background: var(--particle-color); border-radius: 50%;

        .particle:nth-child(1) { left: 10%; width: 5px; height: 5px; animation-duration: 9s; }

            function updateUI(lang) {
                const d = getLangData(lang);
                bannerText.innerHTML = d.banner; mainTitle.textContent = d.title; document.title = d.title;
                labelTarget.textContent = d.target; labelTime.textContent = d.time; valueTime.innerHTML = d.timeVal;
                labelImpact.textContent = d.impact; valueImpact.textContent = d.impactVal;
                labelContent.textContent = d.content; valueContent.textContent = d.dash;
                labelComp.textContent = d.comp; valueComp.textContent = d.dash;
                contactSection.innerHTML = d.contact; toastBox.textContent = d.toast;
                footerNote.textContent = d.footer; drawerTitle.textContent = d.drawerTitle;
                langFab.textContent = d.langBtn || d.drawerTitle;
                detailFab.textContent = d.detailBtn; detailTitle.textContent = d.detailTitle;
                devHead.textContent = d.devHead; srvHead.textContent = d.srvHead;
                document.documentElement.lang = lang;
                document.documentElement.dir = rtlLangs.includes(lang) ? 'rtl' : 'ltr';
                updateDrawerActive(lang); rebindContact();
                if (detailModal.classList.contains('active')) renderDetailModal(lang);
            }

            function updateDrawerActive(lang) {
                drawerList.querySelectorAll('.drawer-lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            }

            function switchLanguage(lang) {
                if (lang === currentLang || !langOrder.includes(lang)) return;
                currentLang = lang; updateUI(lang);
                try { localStorage.setItem('preferred-language', lang); } catch(e) {}
            }

            function openDrawer() { drawerOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
            function closeDrawer() { drawerOverlay.classList.remove('active'); document.body.style.overflow = ''; }

            function rebindContact() {
                const link = document.getElementById('contactLink');
                if (link) link.onclick = (e) => { e.preventDefault(); showToast(); };
            }

            function showToast() {
                if (toastOverlay.classList.contains('active')) {
                    toastOverlay.classList.remove('active');
                    setTimeout(() => { toastBox.textContent = getLangData(currentLang).toast; toastOverlay.classList.add('active'); }, 200);
                } else {
                    toastBox.textContent = getLangData(currentLang).toast; toastOverlay.classList.add('active');
                }
                clearTimeout(toastOverlay._timeout);
                toastOverlay._timeout = setTimeout(() => toastOverlay.classList.remove('active'), 3000);
            }

            function renderDetailModal(lang) {
                const d = getLangData(lang);
                const online = navigator.onLine;
                devContent.innerHTML = `
                    <div class="info-row"><span>${d.ua}</span><span>${navigator.userAgent || '—'}</span></div>
                    <div class="info-row"><span>${d.plat}</span><span>${navigator.platform || '—'}</span></div>
                    <div class="info-row"><span>${d.lang}</span><span>${navigator.language || '—'}</span></div>
                    <div class="info-row"><span>${d.scr}</span><span>${screen.width}×${screen.height}</span></div>
                    <div class="info-row"><span>${d.vp}</span><span>${window.innerWidth}×${window.innerHeight}</span></div>
                    <div class="info-row"><span>${d.net}</span><span>${navigator.connection?.effectiveType || 'unknown'}</span></div>
                    <div class="info-row"><span>${d.online}</span><span>${online ? d.onlineYes : d.onlineNo}</span></div>
                    <div class="info-row"><span>${d.timeNow}</span><span id="liveTime">${new Date().toLocaleTimeString()}</span></div>
                `;
                srvContent.innerHTML = `<div class="info-row"><span>${d.load}</span><span class="load-high">${d.loadHigh}</span></div>`;
            }

            function updateLiveTime() {
                if (!detailModal.classList.contains('active')) return;
                const liveTime = document.getElementById('liveTime');
                if (liveTime) liveTime.textContent = new Date().toLocaleTimeString();
            }

            let liveTimer;
            function openDetailModal() {
                detailModal.classList.add('active'); document.body.style.overflow = 'hidden';
                renderDetailModal(currentLang);
                if (liveTimer) clearInterval(liveTimer);
                liveTimer = setInterval(updateLiveTime, 1000);
            }
            function closeDetailModal() {
                detailModal.classList.remove('active'); document.body.style.overflow = '';
                if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
            }

            langFab.onclick = () => drawerOverlay.classList.contains('active') ? closeDrawer() : openDrawer();
            drawerClose.onclick = closeDrawer;
            drawerOverlay.onclick = (e) => { if (e.target === drawerOverlay) closeDrawer(); };
            detailFab.onclick = openDetailModal;
            modalClose.onclick = closeDetailModal;
            detailModal.onclick = (e) => { if (e.target === detailModal) closeDetailModal(); };
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (drawerOverlay.classList.contains('active')) closeDrawer();
                    else if (detailModal.classList.contains('active')) closeDetailModal();
                }
            });

            function init() {
                buildDrawer();
                const saved = (() => { try { return localStorage.getItem('preferred-language'); } catch(e) { return null; } })();
                const browser = navigator.language || '';
                let def = 'zh-CN';
                if (saved && langOrder.includes(saved)) def = saved;
                else if (browser === 'zh-TW' || browser.startsWith('zh-Hant')) def = 'zh-TW';
                else if (browser.startsWith('zh')) def = 'zh-CN';
                else if (langOrder.includes(browser)) def = browser;
                else { const base = browser.split('-')[0]; if (langOrder.includes(base)) def = base; }
                currentLang = def; updateUI(def); rebindContact();
            }
            init();
        })();
    </script>
</body>
</html>
